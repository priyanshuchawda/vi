name: Feature request
description: Propose an enhancement
title: 'feat: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user/problem are we solving?
      placeholder: What is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred solution and behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives did you consider?
  - type: textarea
    id: risks
    attributes:
      label: Risks and tradeoffs
      description: Security, performance, complexity, compatibility, etc.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked existing issues/discussions for similar ideas.
          required: true
        - label: This request aligns with Electron + React production goals.
          required: true
