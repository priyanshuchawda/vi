version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: 'chore'
      include: 'scope'
    ignore:
      - dependency-name: 'eslint'
        update-types:
          - version-update:semver-major
      - dependency-name: '@eslint/js'
        update-types:
          - version-update:semver-major
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:30'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - ci
      - automated
    commit-message:
      prefix: 'chore'
      include: 'scope'
