name: Automation Lint

on:
  pull_request:
    paths:
      - .github/workflows/**
      - scripts/**
      - '**/*.sh'
  push:
    branches: [main]
    paths:
      - .github/workflows/**
      - scripts/**
      - '**/*.sh'

jobs:
  workflow-lint:
    name: Lint GitHub workflows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run actionlint
        uses: reviewdog/action-actionlint@0d952c597ef8459f634d7145b0b044a9699e5e43

  shell-lint:
    name: Lint shell scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Run shellcheck
        shell: bash
        run: |
          scripts=$(find . -type f -name '*.sh' -not -path './node_modules/*' -not -path './.git/*')
          if [ -z "$scripts" ]; then
            echo "No shell scripts found; skipping shellcheck."
            exit 0
          fi

          # shellcheck disable=SC2086
          shellcheck $scripts
