name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-quality:
    name: Fast Quality (Ubuntu)
    uses: ./.github/workflows/reusable-node-quality.yml
    with:
      os: ubuntu-latest
      run_build: false
      upload_artifacts: false

  full-matrix-quality:
    name: Full Matrix Quality (${{ matrix.os }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [fast-quality]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    uses: ./.github/workflows/reusable-node-quality.yml
    with:
      os: ${{ matrix.os }}
      run_build: true
      upload_artifacts: ${{ matrix.os == 'ubuntu-latest' }}
