name: Docs QA

on:
  pull_request:
    paths:
      - docs/**
      - README.md
      - CONTRIBUTING.md
      - SECURITY.md
      - .github/workflows/docs-qa.yml
      - .github/lychee.toml
      - .markdownlint.json
  push:
    branches: [main]
    paths:
      - docs/**
      - README.md
      - CONTRIBUTING.md
      - SECURITY.md
      - .github/workflows/docs-qa.yml
      - .github/lychee.toml
      - .markdownlint.json

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101
        with:
          config: .markdownlint.json
          globs: |
            **/*.md
            !node_modules/**
            !gemini-cli/**
            !.agent/**
            !.kiro/**

  link-check:
    name: Link check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: --config .github/lychee.toml --no-progress --verbose '**/*.md'
