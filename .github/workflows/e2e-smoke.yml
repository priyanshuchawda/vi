name: E2E Smoke (Optional)

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Build app
        run: npm run build
      - name: Start preview server
        run: npm run preview -- --host 0.0.0.0 --port 7377 &
      - name: Wait for preview
        run: npx wait-on http://127.0.0.1:7377
      - name: Run optional smoke test
        run: RUN_E2E_SMOKE=1 E2E_BASE_URL=http://127.0.0.1:7377 npm run test:e2e:smoke
