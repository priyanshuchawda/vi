name: License Compliance

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - scripts/compliance/**
      - ThirdPartyNotices.json
      - LICENSE
      - .github/workflows/license-compliance.yml
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - scripts/compliance/**
      - ThirdPartyNotices.json
      - LICENSE
      - .github/workflows/license-compliance.yml

jobs:
  verify-third-party-notices:
    name: Verify ThirdPartyNotices is in sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify third-party notices
        run: npm run thirdparty:check
