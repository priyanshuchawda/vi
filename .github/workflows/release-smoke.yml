name: Release Smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-smoke:
    name: Package Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: smoke-linux
          - os: macos-latest
            platform: mac
            artifact_name: smoke-macos
          - os: windows-latest
            platform: win
            artifact_name: smoke-windows

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package smoke artifact
        run: npx electron-builder --dir --${{ matrix.platform }} --x64 --publish never

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.run_number }}
          path: |
            dist/**
            dist-electron/**
            release/**
